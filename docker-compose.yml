version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5430:5432"
    volumes:
      - ./backend/db/pgdata:/var/lib/postgresql/data
    networks:
      - meeting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres_user} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build: ./backend/api
    ports:
      - "8000:8000"
    environment:
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meeting-network
    restart: on-failure
    command: >
      sh -c "echo '⏳ Ожидание полной готовности PostgreSQL...' &&
             sleep 10 &&
             echo '🚀 Запуск API...' &&
             python -m app.main"
    volumes:
      - ./backend/api:/app

  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "8502:8501"
  #   environment:
  #     - API_URL=http://api:8000
  #     - PYTHONUNBUFFERED=1
  #   depends_on:
  #     - api
  #   networks:
  #     - meeting-network
  #   restart: on-failure
  #   command: >
  #     sh -c "echo '⏳ Ожидание запуска API...' &&
  #            sleep 15 &&
  #            echo '🚀 Запуск Streamlit...' &&
  #            streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
  
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - meeting-network

  audio-ml:
    build:
      context: ./ML/diarization_summarization_service
    ports:
      - "8053:8053"
    volumes:
      - ./ML/diarization_summarization_service/models/pyannote:/app/models/pyannote
    environment:
      - PYTHONUNBUFFERED=1
      - HF_API_KEY=${HF_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - PYANNOTE_MODEL_PATH=${PYANNOTE_MODEL_PATH}
    runtime: nvidia
    restart: unless-stopped
    networks:
      - meeting-network

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - meeting-network

  # milvus-standalone:
  #   container_name: milvus-standalone
  #   image: milvusdb/milvus:v2.3.10
  #   command: ["milvus", "run", "standalone"]
  #   environment:
  #   - MILVUS_MODE=standalone
  #   ports:
  #     - "19530:19530"
  #     - "9091:9091"
  #   volumes:
  #     - ./milvus_data/milvus:/var/lib/milvus
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 30
  #     start_period: 40s
  #   networks:
  #     - meeting-network

  rag-service:
    build: ./ML/rag-service
    ports:
      - "8055:8055"
    environment:
      - VECTOR_DB=${VECTOR_DB:-qdrant}
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_INTERNAL_PORT}
      - MILVUS_HOST=${MILVUS_HOST}
      - MILVUS_PORT=${MILVUS_INTERNAL_PORT}
    volumes:
      - ./ML/rag-service/models:/app/models
    networks:
      - meeting-network

  audio-ml-whisper:
    build:
      context: ./ML/whisper_transcription_service
    ports:
      - "8054:8054"
    volumes:
      - ./whisper_transcription_service/models/whisper:/app/models/whisper
    environment:
      - PYTHONUNBUFFERED=1
      - WHISPER_MODEL_PATH=${WHISPER_MODEL_PATH}
    runtime: nvidia
    restart: unless-stopped
    networks:
      - meeting-network

  denoiser:
    build:
      context: ./ML/noise_suppression_service
      dockerfile: Dockerfile
    ports:
      - "8052:8052"
    networks:
      - meeting-network

networks:
  meeting-network:
    driver: bridge