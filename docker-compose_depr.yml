version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: postgres_container
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: postgres
    ports:
      - "5430:5432"
    volumes:
      - ./backend/db/pgdata:/var/lib/postgresql/data
    networks:
      - meeting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build: ./backend/api
    ports:
      - "8000:8000"
    environment:
      DB_NAME: postgres
      DB_USER: postgres_user
      DB_PASSWORD: postgres_password
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meeting-network
    restart: on-failure
    command: >
      sh -c "echo '⏳ Ожидание полной готовности PostgreSQL...' &&
             sleep 10 &&
             echo '🚀 Запуск API...' &&
             python -m app.main"
    volumes:
      - ./backend/api:/app

  frontend:
    build: ./frontend
    ports:
      - "8502:8501"
    environment:
      - API_URL=http://api:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    networks:
      - meeting-network
    restart: on-failure
    command: >
      sh -c "echo '⏳ Ожидание запуска API...' &&
             sleep 15 &&
             echo '🚀 Запуск Streamlit...' &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
  
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - meeting-network

  audio-ml:
    build:
      context: ./ML/diarization_summarization_service
      dockerfile: Dockerfile
      args:
        HF_API_KEY: ${HF_API_KEY}
    ports:
      - "8053:8053"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_API_KEY=${HF_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    runtime: nvidia
    restart: unless-stopped
    networks:
      - meeting-network

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - meeting-network

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./milvus_data/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./milvus_data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.10-gpu
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./milvus_data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              device_ids: ["0"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - meeting-network

  rag-service:
    build: ./ML/rag-service
    ports:
      - "8055:8055"
    environment:
      - VECTOR_DB=${VECTOR_DB:-qdrant}
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_INTERNAL_PORT}
      - MILVUS_HOST=${MILVUS_HOST}
      - MILVUS_PORT=${MILVUS_INTERNAL_PORT}
    volumes:
      - ./ML/rag-service/models:/app/models
    networks:
      - meeting-network
  # audio-ml-whisper:
  #   build:
  #     context: ./ML/whisper_transcription_service
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8054:8054"
  #   environment:
  #     - PYTHONUNBUFFERED=1
  #   runtime: nvidia
  #   restart: unless-stopped
  #   networks:
  #     - meeting-network

  denoiser:
    build:
      context: ./ML/noise_suppression_service
      dockerfile: Dockerfile
    ports:
      - "8052:8052"
    networks:
      - meeting-network

networks:
  meeting-network:
    driver: bridge